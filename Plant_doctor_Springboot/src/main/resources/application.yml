server:
  port: 9999
  servlet:
    context-path: /

spring:
  application:
    name: plant-doctor

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sys?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

  servlet:
    multipart:
      max-file-size: 16MB
      max-request-size: 16MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cropdoctor.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

flask:
  ai-service:
    base-url: http://localhost:5000
    timeout: 30000

file:
  upload-path: ./uploads
  output-path: ./outputs